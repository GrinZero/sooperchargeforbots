<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>LOOI SDK Web Demo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;700;800&family=Azeret+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <div class="backdrop"></div>
    <main class="shell">
      <section class="hero">
        <p class="eyebrow">SOOPERCHARGE SDK</p>
        <h1>LOOI Web Demo</h1>
        <p class="lead">
          这一版只保留第一版 SDK 的核心能力：移动、头部、灯光、吸附回调，以及必要时的原始写入。
        </p>
        <div class="badges">
          <span>移动</span>
          <span>头部</span>
          <span>灯光</span>
          <span>吸附回调</span>
          <span>Raw Write</span>
        </div>
      </section>

      <section class="panel">
        <div class="panel-head">
          <h2>连接与状态</h2>
          <p>连接后会立即握手，并开始监听吸附状态。</p>
        </div>
        <div class="actions">
          <button id="connectBtn" class="primary">连接 LOOI</button>
          <button id="replayHandshakeBtn">重放握手</button>
          <button id="disconnectBtn">断开连接</button>
          <button id="clearLogBtn">清空日志</button>
        </div>
        <div class="status-grid">
          <div class="status-card">
            <span class="label">连接状态</span>
            <strong id="connState">未连接</strong>
          </div>
          <div class="status-card">
            <span class="label">设备</span>
            <strong id="deviceName">-</strong>
          </div>
          <div class="status-card">
            <span class="label">吸附状态</span>
            <strong id="dockState">unknown</strong>
          </div>
          <div class="status-card">
            <span class="label">最近通知</span>
            <strong id="lastNotify">-</strong>
          </div>
        </div>
      </section>

      <section class="panel">
        <div class="panel-head">
          <h2>移动控制</h2>
          <p>适合接轮盘或长按按钮。持续移动会自动循环发送。</p>
        </div>
        <div class="actions">
          <button data-move="forward">前进</button>
          <button data-move="left">左转</button>
          <button data-move="back">后退</button>
          <button data-move="right">右转</button>
          <button id="startLoopBtn">持续左转</button>
          <button id="stopBtn">停止</button>
        </div>
      </section>

      <section class="panel">
        <div class="panel-head">
          <h2>头部与灯光</h2>
          <p>头部用高层方向值，灯光只提供开关。</p>
        </div>
        <div class="actions">
          <button data-head="up">抬头</button>
          <button data-head="center">中位</button>
          <button data-head="down">低头</button>
          <button id="lightOnBtn">开灯</button>
          <button id="lightOffBtn">关灯</button>
        </div>
      </section>

      <section class="panel">
        <div class="panel-head">
          <h2>原始写入</h2>
          <p>仅在需要直接写入 `fe00` / `fed2` / `feda` 时使用。</p>
        </div>
        <div class="payload-list">
          <label>
            <span>Characteristic</span>
            <input id="rawCharacteristicInput" value="fe00" spellcheck="false">
          </label>
          <label>
            <span>Payload Hex</span>
            <input id="rawPayloadInput" value="00100000010032030a0001ff00010a3203ff0003" spellcheck="false">
          </label>
        </div>
        <div class="actions">
          <button id="sendRawBtn">发送 Raw Write</button>
        </div>
      </section>

      <section class="panel terminal">
        <div class="panel-head">
          <h2>实时日志</h2>
          <p>连接、回调、写入和异常都会显示在这里。</p>
        </div>
        <pre id="logView" aria-live="polite"></pre>
      </section>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
